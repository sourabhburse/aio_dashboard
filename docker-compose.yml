version: '3.8'

services:
  # Web Dashboard Service (Serves Web GUI)
  dashboard-web:
    build: .
    container_name: aio-dashboard-web
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      # Ensure database is stored in the shared volume
      - AIO_DB_PATH=/data/aio_dashboard.sqlite3
      - AIO_WEB_HOST=0.0.0.0
      - AIO_WEB_PORT=8000
    volumes:
      - aio_db_data:/data
    # Allows the container to reference the host's network via 'host.docker.internal'
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  # MQTT Ingestion Worker (Listens to telemetry and writes to database)
  mqtt-ingest:
    build: .
    container_name: aio-mqtt-ingest
    command: ["python", "-m", "aio_dashboard.mqtt_ingest"]
    env_file:
      - .env
    environment:
      # Ensure database is stored in the shared volume
      - AIO_DB_PATH=/data/aio_dashboard.sqlite3
    volumes:
      - aio_db_data:/data
    # Allows the container to reference the host's network via 'host.docker.internal'
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

volumes:
  aio_db_data:
